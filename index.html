<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-Down Tactical Engine</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background-color: #1a1a1a;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 2px #000;
            font-family: monospace;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div>WEAPON: <span id="ui-weapon">Pistol (DPS: 1.5, Ammo: 5)</span></div>
        <div>SCORE: <span id="ui-score">7.5</span></div>
        <div>BOUNDS: 2000x2000 (Fixed Map)</div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- CONSTANTS & CONFIG ---
const MAP_SIZE = 2000; // 5x5 layout of 400x400 viewports
const VIEW_WIDTH = canvas.width;
const VIEW_HEIGHT = canvas.height;

// --- GAME STATE ---
const keys = {};
const mouse = { x: 0, y: 0, worldX: 0, worldY: 0 };

class Wall {
    constructor(x, y, w, h) {
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;
    }
    draw(camX, camY) {
        ctx.fillStyle = '#4a5568';
        ctx.fillRect(this.x - camX, this.y - camY, this.w, this.h);
        ctx.strokeStyle = '#2d3748';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x - camX, this.y - camY, this.w, this.h);
    }
}

class WeaponDrop {
    constructor(x, y, dps, maxAmmo) {
        this.x = x;
        this.y = y;
        this.radius = 10;
        this.dps = dps;
        this.maxAmmo = maxAmmo;
    }
    getUtilityScore() {
        return this.dps * this.maxAmmo;
    }
    draw(camX, camY) {
        ctx.beginPath();
        ctx.arc(this.x - camX, this.y - camY, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#ecc94b';
        ctx.fill();
        ctx.closePath();
    }
}

class Hero {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 16;
        this.speed = 4;
        this.angle = 0;
        
        // Initial Weapon Setup
        this.weapon = { dps: 1.5, maxAmmo: 5 };
        
        // Raycasting configurations
        this.viewRange = 350;
        this.viewAngle = Math.PI / 3; // 60 degrees
        this.numRays = 25;
    }

    getUtilityScore() {
        return this.weapon.dps * this.weapon.maxAmmo;
    }

    update() {
        // --- 1. MOVEMENT & INPUT HANDLING ---
        let moveX = 0;
        let moveY = 0;

        if (keys['w'] || keys['ArrowUp']) moveY -= 1;
        if (keys['s'] || keys['ArrowDown']) moveY += 1;
        if (keys['a'] || keys['ArrowLeft']) moveX -= 1;
        if (keys['d'] || keys['ArrowRight']) moveX += 1;

        // Normalize vector so diagonals aren't faster
        if (moveX !== 0 || moveY !== 0) {
            const length = Math.hypot(moveX, moveY);
            let nextX = this.x + (moveX / length) * this.speed;
            let nextY = this.y + (moveY / length) * this.speed;

            // FIX: Finite Map Boundaries check
            nextX = Math.max(this.radius, Math.min(MAP_SIZE - this.radius, nextX));
            nextY = Math.max(this.radius, Math.min(MAP_SIZE - this.radius, nextY));

            // FIX: Wall Collisions (Check X & Y independently for smooth sliding)
            if (!this.checkWallCollision(nextX, this.y)) this.x = nextX;
            if (!this.checkWallCollision(this.x, nextY)) this.y = nextY;
        }

        // Camera Tracking Rotation Tracking
        this.angle = Math.atan2(mouse.worldY - this.y, mouse.worldX - this.x);

        // --- 2. AUTOMATED AI WEAPON EVALUATION ---
        /*
        // UNCOMMENT THIS BLOCK TO ENABLE AUTOMATED WEAPON PICKUP LOGIC
        weaponDrops.forEach((drop, index) => {
            const dist = Math.hypot(drop.x - this.x, drop.y - this.y);
            // If overlapping with the item drop
            if (dist < this.radius + drop.radius) {
                const currentScore = this.getUtilityScore();
                const newScore = drop.getUtilityScore();
                
                // AI Rule: Decide if the item has higher calculated potential utility
                if (newScore > currentScore) {
                    this.weapon = { dps: drop.dps, maxAmmo: drop.maxAmmo };
                    weaponDrops.splice(index, 1); // Remove item from world
                    updateUI();
                }
            }
        });
        */
    }

    checkWallCollision(nx, ny) {
        for (let wall of walls) {
            if (nx + this.radius > wall.x && nx - this.radius < wall.x + wall.w &&
                ny + this.radius > wall.y && ny - this.radius < wall.y + wall.h) {
                return true;
            }
        }
        return false;
    }

    // FIX: Raycasted Raycasting Engine for Obscured Viewcone
    drawViewCone(camX, camY) {
        const startAngle = this.angle - this.viewAngle / 2;
        const angleStep = this.viewAngle / (this.numRays - 1);
        const points = [[this.x - camX, this.y - camY]];

        for (let i = 0; i < this.numRays; i++) {
            const rayAngle = startAngle + i * angleStep;
            let targetX = this.x + Math.cos(rayAngle) * this.viewRange;
            let targetY = this.y + Math.sin(rayAngle) * this.viewRange;

            // Check ray intersection against all walls
            let closestT = 1; 

            for (let wall of walls) {
                const hitT = checkRayRectIntersection(this.x, this.y, targetX, targetY, wall);
                if (hitT !== null && hitT < closestT) {
                    closestT = hitT;
                }
            }

            // Calculate final ray point dynamically reduced by walls
            const finalX = this.x + (targetX - this.x) * closestT;
            const finalY = this.y + (targetY - this.y) * closestT;
            points.push([finalX - camX, finalY - camY]);
        }

        // Render visibility polygon context
        ctx.fillStyle = 'rgba(255, 255, 150, 0.15)';
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i][0], points[i][1]);
        }
        ctx.closePath();
        ctx.fill();
    }

    draw(camX, camY) {
        // Base Character Rendering
        ctx.save();
        ctx.translate(this.x - camX, this.y - camY);
        ctx.rotate(this.angle);
        
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#3182ce';
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#2b6cb0';
        ctx.stroke();

        // Direction Pointer / Gun barrel representation
        ctx.fillStyle = '#1a365d';
        ctx.fillRect(0, -4, 22, 8);
        ctx.restore();
    }
}

// --- RAY INTERSECTION UTILITY ---
function checkRayRectIntersection(rx1, ry1, rx2, ry2, rect) {
    // Standard Liang-Barsky parametric line clipping algorithm mapping down closest point of intersection
    let t0 = 0, t1 = 1;
    const dx = rx2 - rx1;
    const dy = ry2 - ry1;

    const edges = [
        { p: -dx, q: rx1 - rect.x },           // Left
        { p: dx, q: rect.x + rect.w - rx1 },   // Right
        { p: -dy, q: ry1 - rect.y },           // Top
        { p: dy, q: rect.y + rect.h - ry1 }    // Bottom
    ];

    for (let edge of edges) {
        if (edge.p === 0) {
            if (edge.q < 0) return null;
        } else {
            const t = edge.q / edge.p;
            if (edge.p < 0) {
                if (t > t1) return null;
                if (t > t0) t0 = t;
            } else {
                if (t < t0) return null;
                if (t < t1) t1 = t;
            }
        }
    }
    return t0;
}

// --- INITIALIZE SCENE MAP SYSTEM ---
const hero = new Hero(100, 100);
const walls = [
    // House 1 Bounds
    new Wall(300, 200, 400, 200),
    new Wall(300, 400, 100, 200),
    new Wall(600, 400, 100, 200),
    // House 2 Bounds
    new Wall(900, 600, 500, 400),
    // Map Boundaries decorative assets
    new Wall(0, 0, MAP_SIZE, 20),
    new Wall(0, 0, 20, MAP_SIZE),
    new Wall(0, MAP_SIZE - 20, MAP_SIZE, 20),
    new Wall(MAP_SIZE - 20, 0, 20, MAP_SIZE)
];

const weaponDrops = [
    new WeaponDrop(500, 150, 4.0, 1), // Shotgun burst archetype (Score: 4.0)
    new WeaponDrop(800, 500, 2.0, 8)  // Carbine archetype (Score: 16.0 -> Better Choice)
];

function updateUI() {
    document.getElementById('ui-weapon').innerText = `DPS: ${hero.weapon.dps}, Max Ammo: ${hero.weapon.maxAmmo}`;
    document.getElementById('ui-score').innerText = hero.getUtilityScore().toFixed(1);
}

// --- EVENT LISTENERS ---
window.addEventListener('keydown', (e) => keys[e.key] = true);
window.addEventListener('keyup', (e) => keys[e.key] = false);

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

// --- CORE ENGINE LOOP ---
function loop() {
    hero.update();

    // FIXED CAMERA MECHANIC: Locking the viewport translation matrix strictly around the hero tracking position
    let camX = hero.x - VIEW_WIDTH / 2;
    let camY = hero.y - VIEW_HEIGHT / 2;

    // Constrain camera position to total boundaries of the 5x5 fixed environment
    camX = Math.max(0, Math.min(MAP_SIZE - VIEW_WIDTH, camX));
    camY = Math.max(0, Math.min(MAP_SIZE - VIEW_HEIGHT, camY));

    // Dynamic mouse conversion to world coords based on calculated camera configuration 
    mouse.worldX = mouse.x + camX;
    mouse.worldY = mouse.y + camY;

    // Clear Screen Context Frame
    ctx.clearRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);

    // Draw grid environment floor indicators for space context
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    for(let x = 0; x < MAP_SIZE; x += 100) {
        ctx.beginPath(); ctx.moveTo(x - camX, 0); ctx.lineTo(x - camX, MAP_SIZE); ctx.stroke();
    }
    for(let y = 0; y < MAP_SIZE; y += 100) {
        ctx.beginPath(); ctx.moveTo(0, y - camY); ctx.lineTo(MAP_SIZE, y - camY); ctx.stroke();
    }

    // Render operations
    weaponDrops.forEach(drop => drop.draw(camX, camY));
    hero.drawViewCone(camX, camY);
    walls.forEach(wall => wall.draw(camX, camY));
    hero.draw(camX, camY);

    requestAnimationFrame(loop);
}

// Initialize Loop
loop();
</script>
</body>
</html>
