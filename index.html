<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical AI Sim - Original Style</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #d1d5db;
            font-family: monospace;
            overflow: hidden;
            position: relative;
            height: 100vh;
            width: 100vw;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
        }
        #ui-window {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            height: auto;
            background: rgba(16, 16, 16, 0.9);
            border: 2px solid #3f3f46;
            border-radius: 4px;
            padding: 15px;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
        }
        #ui-window h3 {
            margin: 0 0 10px 0;
            color: #fca311;
            text-transform: uppercase;
            font-size: 16px;
            text-align: center;
        }
        .ui-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .ui-line .val { color: #fca311; font-weight: bold; }
        .danger .val { color: #dc2626; }
    </style>
</head>
<body>

    <div id="ui-window">
        <h3>Simulation Stats</h3>
        <div class="ui-line"><span>HERO MODE:</span> <span class="val">AUTONOMOUS</span></div>
        <div class="ui-line"><span>WEAPON:</span> <span id="ui-weapon" class="val">Pistol (DPS 1.5, Ammo 5)</span></div>
        <div class="ui-line"><span>SCORE:</span> <span id="ui-score" class="val">7.5</span></div>
        <div class="ui-line danger"><span>ZOMBIES ALIVE:</span> <span id="ui-zombies" class="val">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- FIXED MAP CONFIGURATION (5x5 of original view) ---
const MAP_SIZE = 2000; 
let VIEW_WIDTH = window.innerWidth;
let VIEW_HEIGHT = window.innerHeight;

function resizeCanvas() {
    VIEW_WIDTH = window.innerWidth;
    VIEW_HEIGHT = window.innerHeight;
    canvas.width = VIEW_WIDTH;
    canvas.height = VIEW_HEIGHT;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- ENTITIES & OBJECTS ---
const keys = {};

class Wall {
    constructor(x, y, w, h) {
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;
    }
    draw(camX, camY) {
        // ORIGINAL STYLE: Bright Green Walls
        ctx.fillStyle = '#10b981';
        ctx.fillRect(this.x - camX, this.y - camY, this.w, this.h);
        ctx.strokeStyle = '#059669';
        ctx.lineWidth = 1;
        ctx.strokeRect(this.x - camX, this.y - camY, this.w, this.h);
    }
}

class WeaponDrop {
    constructor(x, y, dps, maxAmmo) {
        this.x = x;
        this.y = y;
        this.radius = 6;
        this.dps = dps;
        this.maxAmmo = maxAmmo;
    }
    getUtilityScore() { return this.dps * this.maxAmmo; }
    draw(camX, camY) {
        // ORIGINAL STYLE: Yellow Dot Pickup
        ctx.beginPath();
        ctx.arc(this.x - camX, this.y - camY, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#fca311';
        ctx.fill();
        ctx.closePath();
    }
}

class Zombie {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 12;
        this.speed = 1.6;
    }
    update(heroX, heroY) {
        const dx = heroX - this.x;
        const dy = heroY - this.y;
        const dist = Math.hypot(dx, dy);
        
        if (dist > 5) {
            const angle = Math.atan2(dy, dx);
            let nextX = this.x + Math.cos(angle) * this.speed;
            let nextY = this.y + Math.sin(angle) * this.speed;

            if (!checkWallCollision(nextX, this.y, this.radius)) this.x = nextX;
            if (!checkWallCollision(this.x, nextY, this.radius)) this.y = nextY;
        }
    }
    draw(camX, camY) {
        // ORIGINAL STYLE: Red Zombie
        ctx.beginPath();
        ctx.arc(this.x - camX, this.y - camY, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#dc2626';
        ctx.fill();
        ctx.closePath();
    }
}

class Hero {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 12;
        this.speed = 3.8;
        this.angle = 0;
        this.weapon = { dps: 1.5, maxAmmo: 5 };
        this.viewRange = 420; 
        this.viewAngle = Math.PI / 3; // 60 degrees
        this.numRays = 25; 
    }

    getUtilityScore() { return this.weapon.dps * this.weapon.maxAmmo; }

    update() {
        // AUTONOMOUS AI MOVEMENT (driven entirely by logic, not mouse)
        // Find closest weapon pickup
        let target = null;
        let minDist = Infinity;
        
        for(let drop of weaponDrops) {
            let d = Math.hypot(drop.x - this.x, drop.y - this.y);
            if(d < minDist) {
                minDist = d;
                target = drop;
            }
        }

        if (target) {
            const dx = target.x - this.x;
            const dy = target.y - this.y;
            this.angle = Math.atan2(dy, dx);

            // FIX: Smooth arrival, no bouncing
            if (minDist > this.speed) {
                let nextX = this.x + Math.cos(this.angle) * this.speed;
                let nextY = this.y + Math.sin(this.angle) * this.speed;
                this.executeMovement(nextX, nextY);
            } else {
                this.executeMovement(target.x, target.y);
            }
        }

        // --- AUTOMATED AI WEAPON EVALUATION ---
        weaponDrops.forEach((drop, index) => {
            const dist = Math.hypot(drop.x - this.x, drop.y - this.y);
            if (dist < this.radius + drop.radius + 2) { 
                if (drop.getUtilityScore() > this.getUtilityScore()) {
                    this.weapon = { dps: drop.dps, maxAmmo: drop.maxAmmo };
                    weaponDrops.splice(index, 1);
                    updateUI();
                }
            }
        });
    }

    executeMovement(nx, ny) {
        // FIX: Finite Map boundaries
        nx = Math.max(this.radius, Math.min(MAP_SIZE - this.radius, nx));
        ny = Math.max(this.radius, Math.min(MAP_SIZE - this.radius, ny));

        // FIX: Strict wall collision
        if (!checkWallCollision(nx, this.y, this.radius)) this.x = nx;
        if (!checkWallCollision(this.x, ny, this.radius)) this.y = ny;
    }

    drawViewCone(camX, camY) {
        const startAngle = this.angle - this.viewAngle / 2;
        const angleStep = this.viewAngle / (this.numRays - 1);
        const points = [[this.x - camX, this.y - camY]];

        for (let i = 0; i < this.numRays; i++) {
            const rayAngle = startAngle + i * angleStep;
            let targetX = this.x + Math.cos(rayAngle) * this.viewRange;
            let targetY = this.y + Math.sin(rayAngle) * this.viewRange;

            let closestT = 1; 
            for (let wall of walls) {
                const hitT = checkRayRectIntersection(this.x, this.y, targetX, targetY, wall);
                if (hitT !== null && hitT < closestT) closestT = hitT;
            }

            const finalX = this.x + (targetX - this.x) * closestT;
            const finalY = this.y + (targetY - this.y) * closestT;
            points.push([finalX - camX, finalY - camY]);
        }

        // ORIGINAL STYLE: Soft Yellow Visuals Arc
        ctx.fillStyle = 'rgba(252, 163, 17, 0.1)';
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i][0], points[i][1]);
        }
        ctx.closePath();
        ctx.fill();
    }

    draw(camX, camY) {
        // ORIGINAL STYLE: Green Hero
        ctx.save();
        ctx.translate(this.x - camX, this.y - camY);
        ctx.rotate(this.angle);
        
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#10b981';
        ctx.fill();
        ctx.closePath();
        ctx.restore();
    }
}

function checkWallCollision(nx, ny, radius) {
    for (let wall of walls) {
        if (nx + radius > wall.x && nx - radius < wall.x + wall.w &&
            ny + radius > wall.y && ny - radius < wall.y + wall.h) {
            return true;
        }
    }
    return false;
}

function checkRayRectIntersection(rx1, ry1, rx2, ry2, rect) {
    let t0 = 0, t1 = 1;
    const dx = rx2 - rx1;
    const dy = ry2 - ry1;

    const edges = [
        { p: -dx, q: rx1 - rect.x },
        { p: dx, q: rect.x + rect.w - rx1 },
        { p: -dy, q: ry1 - rect.y },
        { p: dy, q: rect.y + rect.h - ry1 }
    ];

    for (let edge of edges) {
        if (edge.p === 0) {
            if (edge.q < 0) return null;
        } else {
            const t = edge.q / edge.p;
            if (edge.p < 0) {
                if (t > t1) return null;
                if (t > t0) t0 = t;
            } else {
                if (t < t0) return null;
                if (t < t1) t1 = t;
            }
        }
    }
    return t0;
}

// --- WORLD INITIALIZATION (Original Layout Vibe) ---
const hero = new Hero(200, 200);

const walls = [
    // Define a "house" using green wall segments, leaving an Entrance
    new Wall(400, 200, 20, 200), // West Wall
    new Wall(400, 200, 250, 20), // North Wall
    new Wall(650, 200, 20, 200), // East Wall
    new Wall(400, 400, 100, 20), // South Wall L
    // ENTRANCE IS HERE (100px wide)
    new Wall(600, 400, 70, 20),  // South Wall R

    // Another room
    new Wall(1000, 600, 300, 20), // North
    new Wall(1000, 600, 20, 250), // West
    new Wall(1000, 850, 300, 20), // South
    // Entrance on the East side (open)

    // Map Perimeter Caging (Thick boundary walls)
    new Wall(0, 0, MAP_SIZE, 30),
    new Wall(0, 0, 30, MAP_SIZE),
    new Wall(0, MAP_SIZE - 30, MAP_SIZE, 30),
    new Wall(MAP_SIZE - 30, 0, 30, MAP_SIZE)
];

const weaponDrops = [
    new WeaponDrop(525, 300, 4.0, 1), // Inside the first house
    new WeaponDrop(1150, 725, 2.0, 8), // Inside the second room
    new WeaponDrop(250, 900, 1.5, 12)  // Out in the open field
];

const zombies = [
    new Zombie(800, 500),
    new Zombie(1200, 200),
    new Zombie(300, 900),
    new Zombie(1400, 1400)
];

function updateUI() {
    document.getElementById('ui-weapon').innerText = `Pistol (DPS ${hero.weapon.dps}, Ammo ${hero.weapon.maxAmmo})`;
    document.getElementById('ui-score').innerText = hero.getUtilityScore().toFixed(1);
    document.getElementById('ui-zombies').innerText = zombies.length;
}
updateUI();

// --- GAME LOOP ---
function loop() {
    // CAMERA LOCK: Tightly centered on the autonomous green AI hero
    let camX = hero.x - VIEW_WIDTH / 2;
    let camY = hero.y - VIEW_HEIGHT / 2;
    camX = Math.max(0, Math.min(MAP_SIZE - VIEW_WIDTH, camX));
    camY = Math.max(0, Math.min(MAP_SIZE - VIEW_HEIGHT, camY));

    // Update Entities
    hero.update();
    zombies.forEach(zombie => zombie.update(hero.x, hero.y));

    // Draw Frame (Original Aesthetic Order)
    ctx.clearRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);

    // Schematic Grid rendering
    ctx.strokeStyle = '#262626';
    ctx.lineWidth = 1;
    for(let x = 0; x < MAP_SIZE; x += 100) {
        ctx.beginPath(); ctx.moveTo(x - camX, 0); ctx.lineTo(x - camX, MAP_SIZE); ctx.stroke();
    }
    for(let y = 0; y < MAP_SIZE; y += 100) {
        ctx.beginPath(); ctx.moveTo(0, y - camY); ctx.lineTo(MAP_SIZE, y - camY); ctx.stroke();
    }

    // DRAW ORDER
    weaponDrops.forEach(drop => drop.draw(camX, camY)); // Yellow dots
    hero.drawViewCone(camX, camY); // Yellow Raycasted Arc
    zombies.forEach(zombie => zombie.draw(camX, camY)); // Red zombies
    walls.forEach(wall => wall.draw(camX, camY)); // Green wall segments (with entrances)
    hero.draw(camX, camY); // Green hero

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
