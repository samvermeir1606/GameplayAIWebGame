<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical AI Simulation</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: monospace;
            overflow: hidden;
            position: relative;
            height: 100vh;
            width: 100vw;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
        }
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            pointer-events: none;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 260px;
        }
        .ui-row {
            display: flex;
            justify-content: space-between;
        }
        .highlight { color: #00ffcc; font-weight: bold; }
        .danger { color: #ff3333; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="ui-row"><span>HERO MODE:</span> <span class="highlight">AUTONOMOUS AI</span></div>
        <div class="ui-row"><span>WEAPON:</span> <span id="ui-weapon" style="color: #ffcc00;">Pistol (DPS: 1.5, Ammo: 5)</span></div>
        <div class="ui-row"><span>WEAPON SCORE:</span> <span id="ui-score" class="highlight">7.5</span></div>
        <div class="ui-row"><span>ZOMBIES ALIVE:</span> <span id="ui-zombies" class="danger">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME SYSTEM CONFIG ---
const MAP_SIZE = 2000; // 5x5 Grid representation
let VIEW_WIDTH = window.innerWidth;
let VIEW_HEIGHT = window.innerHeight;

function resizeCanvas() {
    VIEW_WIDTH = window.innerWidth;
    VIEW_HEIGHT = window.innerHeight;
    canvas.width = VIEW_WIDTH;
    canvas.height = VIEW_HEIGHT;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Wall {
    constructor(x, y, w, h) {
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;
    }
    draw(camX, camY) {
        ctx.fillStyle = '#222226';
        ctx.fillRect(this.x - camX, this.y - camY, this.w, this.h);
        ctx.strokeStyle = '#44444a';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x - camX, this.y - camY, this.w, this.h);
    }
}

class WeaponDrop {
    constructor(x, y, dps, maxAmmo, name) {
        this.x = x;
        this.y = y;
        this.w = 16;
        this.h = 16;
        this.dps = dps;
        this.maxAmmo = maxAmmo;
        this.name = name;
    }
    getUtilityScore() {
        return this.dps * this.maxAmmo;
    }
    draw(camX, camY) {
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(this.x - this.w/2 - camX, this.y - this.h/2 - camY, this.w, this.h);
        ctx.strokeStyle = '#fff';
        ctx.strokeRect(this.x - this.w/2 - camX, this.y - this.h/2 - camY, this.w, this.h);
    }
}

class Zombie {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 14;
        this.speed = 1.8;
    }
    update(heroX, heroY) {
        // Basic tracking behavior pushing towards hero coordinates
        const dx = heroX - this.x;
        const dy = heroY - this.y;
        const dist = Math.hypot(dx, dy);
        
        if (dist > 5) {
            const angle = Math.atan2(dy, dx);
            let nextX = this.x + Math.cos(angle) * this.speed;
            let nextY = this.y + Math.sin(angle) * this.speed;

            if (!checkWallCollision(nextX, this.y, this.radius)) this.x = nextX;
            if (!checkWallCollision(this.x, nextY, this.radius)) this.y = nextY;
        }
    }
    draw(camX, camY) {
        ctx.beginPath();
        ctx.arc(this.x - camX, this.y - camY, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#33cc33';
        ctx.fill();
        ctx.strokeStyle = '#116611';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}

class Hero {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 15;
        this.speed = 3.5;
        this.angle = 0;
        
        this.weapon = { name: 'Pistol', dps: 1.5, maxAmmo: 5 };
        
        this.viewRange = 400; 
        this.viewAngle = Math.PI / 3; // 60 degrees
        this.numRays = 25; 
    }

    getUtilityScore() {
        return this.weapon.dps * this.weapon.maxAmmo;
    }

    update() {
        // --- CHOOSE TARGET / AI ENGINE WORKSPACE ---
        // Right now, the AI dynamically targets the closest item drop to demonstrate autonomy.
        let targetX = this.x;
        let targetY = this.y;
        let hasTarget = false;

        if (weaponDrops.length > 0) {
            let closestDrop = weaponDrops[0];
            let minDist = Math.hypot(closestDrop.x - this.x, closestDrop.y - this.y);
            
            for (let drop of weaponDrops) {
                let d = Math.hypot(drop.x - this.x, drop.y - this.y);
                if (d < minDist) {
                    minDist = d;
                    closestDrop = drop;
                }
            }
            targetX = closestDrop.x;
            targetY = closestDrop.y;
            hasTarget = true;
        }

        // --- AUTONOMOUS AI MOVEMENT EXECUTION ---
        if (hasTarget) {
            const dx = targetX - this.x;
            const dy = targetY - this.y;
            const dist = Math.hypot(dx, dy);

            this.angle = Math.atan2(dy, dx);

            // FIX: Smooth arrival snapping prevents standard overshooting/jittering oscillations
            if (dist > this.speed) {
                let nextX = this.x + Math.cos(this.angle) * this.speed;
                let nextY = this.y + Math.sin(this.angle) * this.speed;
                this.executeMovement(nextX, nextY);
            } else {
                this.executeMovement(targetX, targetY);
            }
        }

        // --- AUTOMATED AI WEAPON EVALUATION ---
        // Change or augment this conditional behavior blocks as you swap out logic
        weaponDrops.forEach((drop, index) => {
            const dist = Math.hypot(drop.x - this.x, drop.y - this.y);
            if (dist < this.radius + 10) { 
                const currentScore = this.getUtilityScore();
                const newScore = drop.getUtilityScore();
                
                // AI Rule: Decide swap eligibility based on weapon metric scoring definitions
                if (newScore > currentScore) {
                    this.weapon = { name: drop.name, dps: drop.dps, maxAmmo: drop.maxAmmo };
                    weaponDrops.splice(index, 1);
                    updateUI();
                }
            }
        });
    }

    executeMovement(nx, ny) {
        // FIX: Finite boundary enforcement
        nx = Math.max(this.radius, Math.min(MAP_SIZE - this.radius, nx));
        ny = Math.max(this.radius, Math.min(MAP_SIZE - this.radius, ny));

        // FIX: Slide collision axis resolution preventing wall clipping
        if (!checkWallCollision(nx, this.y, this.radius)) this.x = nx;
        if (!checkWallCollision(this.x, ny, this.radius)) this.y = ny;
    }

    drawViewCone(camX, camY) {
        const startAngle = this.angle - this.viewAngle / 2;
        const angleStep = this.viewAngle / (this.numRays - 1);
        const points = [[this.x - camX, this.y - camY]];

        for (let i = 0; i < this.numRays; i++) {
            const rayAngle = startAngle + i * angleStep;
            let targetX = this.x + Math.cos(rayAngle) * this.viewRange;
            let targetY = this.y + Math.sin(rayAngle) * this.viewRange;

            let closestT = 1; 

            for (let wall of walls) {
                const hitT = checkRayRectIntersection(this.x, this.y, targetX, targetY, wall);
                if (hitT !== null && hitT < closestT) {
                    closestT = hitT;
                }
            }

            const finalX = this.x + (targetX - this.x) * closestT;
            const finalY = this.y + (targetY - this.y) * closestT;
            points.push([finalX - camX, finalY - camY]);
        }

        ctx.fillStyle = 'rgba(0, 255, 204, 0.06)';
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i][0], points[i][1]);
        }
        ctx.closePath();
        ctx.fill();
    }

    draw(camX, camY) {
        ctx.save();
        ctx.translate(this.x - camX, this.y - camY);
        ctx.rotate(this.angle);
        
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#1a73e8';
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#64b5f6';
        ctx.stroke();

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, -3, 18, 6);
        ctx.restore();
    }
}

function checkWallCollision(nx, ny, radius) {
    for (let wall of walls) {
        if (nx + radius > wall.x && nx - radius < wall.x + wall.w &&
            ny + radius > wall.y && ny - radius < wall.y + wall.h) {
            return true;
        }
    }
    return false;
}

function checkRayRectIntersection(rx1, ry1, rx2, ry2, rect) {
    let t0 = 0, t1 = 1;
    const dx = rx2 - rx1;
    const dy = ry2 - ry1;

    const edges = [
        { p: -dx, q: rx1 - rect.x },
        { p: dx, q: rect.x + rect.w - rx1 },
        { p: -dy, q: ry1 - rect.y },
        { p: dy, q: rect.y + rect.h - ry1 }
    ];

    for (let edge of edges) {
        if (edge.p === 0) {
            if (edge.q < 0) return null;
        } else {
            const t = edge.q / edge.p;
            if (edge.p < 0) {
                if (t > t1) return null;
                if (t > t0) t0 = t;
            } else {
                if (t < t0) return null;
                if (t < t1) t1 = t;
            }
        }
    }
    return t0;
}

// --- INITIALIZE ELEMENTS ---
const hero = new Hero(150, 150);
const walls = [
    new Wall(350, 200, 300, 200),
    new Wall(850, 400, 200, 400),
    new Wall(250, 800, 400, 200),
    // Map bounds walls
    new Wall(0, 0, MAP_SIZE, 20),
    new Wall(0, 0, 20, MAP_SIZE),
    new Wall(0, MAP_SIZE - 20, MAP_SIZE, 20),
    new Wall(MAP_SIZE - 20, 0, 20, MAP_SIZE)
];

const weaponDrops = [
    new WeaponDrop(500, 120, 4.0, 1, 'Heavy Shotgun'), 
    new WeaponDrop(950, 350, 2.0, 8, 'Tactical Rifle'),
    new WeaponDrop(450, 900, 1.5, 12, 'Extended Smg')
];

const zombies = [
    new Zombie(400, 500),
    new Zombie(1000, 200),
    new Zombie(200, 900),
    new Zombie(1200, 1200)
];

function updateUI() {
    document.getElementById('ui-weapon').innerText = `${hero.weapon.name} (DPS: ${hero.weapon.dps}, Ammo: ${hero.weapon.maxAmmo})`;
    document.getElementById('ui-score').innerText = hero.getUtilityScore().toFixed(1);
    document.getElementById('ui-zombies').innerText = zombies.length;
}
updateUI();

// --- ENGINE FRAME EXECUTION ---
function loop() {
    hero.update();
    zombies.forEach(zombie => zombie.update(hero.x, hero.y));

    // CAMERA SNAP LOCK: Centered right over our autonomous AI hero unit
    let camX = hero.x - VIEW_WIDTH / 2;
    let camY = hero.y - VIEW_HEIGHT / 2;

    camX = Math.max(0, Math.min(MAP_SIZE - VIEW_WIDTH, camX));
    camY = Math.max(0, Math.min(MAP_SIZE - VIEW_HEIGHT, camY));

    ctx.clearRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);

    // Matrix Grid Floor Render Operations
    ctx.strokeStyle = '#111115';
    ctx.lineWidth = 1;
    const step = 100;
    for(let x = 0; x < MAP_SIZE; x += step) {
        ctx.beginPath(); ctx.moveTo(x - camX, 0); ctx.lineTo(x - camX, MAP_SIZE); ctx.stroke();
    }
    for(let y = 0; y < MAP_SIZE; y += step) {
        ctx.beginPath(); ctx.moveTo(0, y - camY); ctx.lineTo(MAP_SIZE, y - camY); ctx.stroke();
    }

    // Processing Draw Pipeline Stages
    weaponDrops.forEach(drop => drop.draw(camX, camY));
    hero.drawViewCone(camX, camY);
    zombies.forEach(zombie => zombie.draw(camX, camY));
    walls.forEach(wall => wall.draw(camX, camY));
    hero.draw(camX, camY);

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
